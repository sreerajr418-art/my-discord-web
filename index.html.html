<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Discord Bot | Server Selection</title>
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-nav: #12141c;
            --card-bg: #1a1d26;
            --accent: #5865F2;
            --accent-hover: #4752C4;
            --text-main: #ffffff;
            --text-muted: #949ba4;
            --sidebar-bg: #15171e;
            --success: #23a55a;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* NAVIGATION BAR */
        .navbar {
            background-color: var(--bg-nav);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
        }

        .nav-btn {
            background-color: var(--accent);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        /* SERVER SELECTION SCREEN */
        .server-selection-screen {
            display: block;
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .server-selection-screen h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .server-selection-screen p {
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .server-grid {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .server-card {
            background-color: var(--bg-nav);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 25px;
            width: 220px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .server-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.2);
        }

        .server-icon-img {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            border: 2px solid var(--accent);
            object-fit: cover;
            display: block;
        }

        .server-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* MAIN DASHBOARD SECTION */
        .dashboard-section {
            display: none;
            max-width: 1100px;
            margin: 40px auto 80px auto;
            padding: 0 20px;
        }

        .dashboard-section h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .dashboard-container {
            background-color: var(--bg-nav);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            display: flex;
            height: 500px;
            overflow: hidden;
            text-align: left;
        }

        /* Sidebar */
        .db-sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            padding: 25px 15px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .avatar-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .db-menu-item {
            padding: 14px 18px;
            color: var(--text-muted);
            border-radius: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }

        .db-menu-item:hover {
            background-color: rgba(255,255,255,0.03);
            color: white;
        }

        .db-menu-item.active {
            background-color: rgba(88, 101, 242, 0.15);
            color: var(--accent);
        }

        /* Main Content */
        .db-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .db-panel {
            display: none;
        }

        .db-panel.active {
            display: block;
        }

        .db-header {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .server-badge {
            font-size: 0.9rem;
            background-color: rgba(35, 165, 90, 0.15);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .toggle-box {
            background-color: var(--card-bg);
            padding: 22px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
