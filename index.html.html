<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora Premium Infrastructure Dashboard</title>
    <style>
        :root {
            --bg-color: #0a0512;
            --panel-bg: #130b24;
            --accent-purple: #a855f7;
            --text-main: #f3e8ff;
            --text-muted: #9333ea;
            --neon-glow: 0 0 15px rgba(168, 85, 247, 0.6);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--text-muted);
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--accent-purple);
            text-shadow: var(--neon-glow);
            margin: 0;
            letter-spacing: 2px;
        }

        header p {
            color: #c084fc;
            margin: 5px 0 0 0;
            font-size: 0.9rem;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid rgba(147, 51, 234, 0.4);
            border-radius: 14px;
            padding: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .panel h2 {
            margin-top: 0;
            color: var(--accent-purple);
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
            padding-bottom: 12px;
            font-size: 1.3rem;
        }

        /* Enhanced Music Controller Layout */
        .music-player {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: linear-gradient(135deg, #1a0f33, #0d061a);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--text-muted);
            background: #0a0512;
            color: white;
            font-size: 0.9rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: var(--neon-glow);
        }

        .btn {
            background-color: var(--text-muted);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--accent-purple);
            box-shadow: var(--neon-glow);
            transform: translateY(-1px);
        }

        .player-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-player {
            font-size: 1.4rem;
            padding: 12px 24px;
            background-color: #24143e;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .volume-container {
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .volume-container label {
            font-size: 0.85rem;
            color: #c084fc;
        }

        /* Modern Toggle Switches UI */
        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(36, 20, 62, 0.4);
            border-radius: 8px;
        }

        .switch-container span {
            font-size: 0.95rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a1b4e;
            transition: .4s;
            border-radius: 28px;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 3px; bottom: 3px;
            background-color: #f3e8ff;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent-purple); box-shadow: var(--neon-glow); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1>VELORA ENGINE CORE</h1>
        <p>Operational Web Mapping & Infrastructure Framework</p>
    </header>

    <div class="grid-layout">
        <div class="panel">
            <h2>🎵 Audio Stream Pipeline</h2>
            <div class="music-player">
                <div class="search-box">
                    <input type="text" id="songQuery" placeholder="Search track or inject asset URL...">
                    <button class="btn" onclick="triggerMusicAction('play_web')">Stream</button>
                </div>
                
                <div class="player-buttons">
                    <button class="btn btn-player" onclick="triggerMusicAction('pause')" title="Pause Frame">⏸️</button>
                    <button class="btn btn-player" onclick="triggerMusicAction('resume')" title="Resume Stream">▶️</button>
                    <button class="btn btn-player" onclick="triggerMusicAction('skip')" title="Skip Sequence">⏭️</button>
                    <button class="btn btn-player" onclick="triggerMusicAction('stop')" title="Terminate Audio">⏹️</button>
                </div>

                <div class="volume-container">
                    <label>Volume Output Metric</label>
                    <input type="range" min="0" max="150" value="100" style="width: 100%; accent-color: var(--accent-purple);" onchange="adjustVolume(this.value)">
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>🛡️ System Filtering Parameters</h2>
            <div class="switch-container">
                <span>AutoMod: Blacklist Invite & Web Links</span>
                <label class="switch">
                    <input type="checkbox" id="auto_mod_links" onchange="toggleFeature('auto_mod_links')">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="switch-container">
                <span>Anti-Spam Packet Isolation</span>
                <label class="switch">
                    <input type="checkbox" id="anti_spam" onchange="toggleFeature('anti_spam')">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>
</div>

<script>
    // Link Configuration Arrays (Remember to update your Live Server IP details)
    const API_BASE = "http://YOUR_BOT_PANEL_IP:15378"; 
    const CURRENT_GUILD = "1350118248934408233"; // Your active discord server tracking node ID

    async function triggerMusicAction(action) {
        const queryVal = document.getElementById('songQuery').value;
        try {
            const response = await fetch(`${API_BASE}/api/music_control`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    guild_id: CURRENT_GUILD,
                    action: action,
                    query: queryVal
                })
            });
            const data = await response.json();
            if(data.success) console.log(`Pipeline array structural trigger deployed: ${action}`);
        } catch (error) {
            console.error("Pipeline node communication failure:", error);
        }
    }

    async function adjustVolume(vol) {
        try {
            await fetch(`${API_BASE}/api/music_control`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    guild_id: CURRENT_GUILD,
                    action: 'volume',
                    volume: vol
                })
            });
        } catch (error) {
            console.error("Volume adjustment packet loss:", error);
        }
    }

    async function toggleFeature(featureName) {
        try {
            await fetch(`${API_BASE}/api/toggle`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    guild_id: CURRENT_GUILD,
                    feature: featureName
                })
            });
        } catch (error) {
            console.error("Feature toggle system fault:", error);
        }
    }
</script>

</body>
</html>
