<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora Advanced Master Dashboard</title>
    <style>
        :root {
            --bg-color: #0a0512;
            --panel-bg: #130b24;
            --accent-purple: #a855f7;
            --text-main: #f3e8ff;
            --text-muted: #9333ea;
            --neon-glow: 0 0 15px rgba(168, 85, 247, 0.6);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--text-muted);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: var(--accent-purple);
            text-shadow: var(--neon-glow);
            margin: 0;
            letter-spacing: 2px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a0f33;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid var(--text-muted);
        }

        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid rgba(147, 51, 234, 0.4);
            border-radius: 14px;
            padding: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .panel h2 {
            margin-top: 0;
            color: var(--accent-purple);
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
            padding-bottom: 12px;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: #c084fc;
        }

        .form-group input, .form-group select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--text-muted);
            background: #0a0512;
            color: white;
        }

        /* Music Controller Style */
        .music-player {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: linear-gradient(135deg, #1a0f33, #0d061a);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--text-muted);
            background: #0a0512;
            color: white;
        }

        .btn {
            background-color: var(--text-muted);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: var(--accent-purple);
            box-shadow: var(--neon-glow);
        }

        .player-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-player {
            font-size: 1.4rem;
            padding: 12px 24px;
            background-color: #24143e;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        /* Modern Toggle Switches */
        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(36, 20, 62, 0.4);
            border-radius: 8px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2a1b4e;
            transition: .4s;
            border-radius: 26px;
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: #f3e8ff;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent-purple); box-shadow: var(--neon-glow); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <div>
            <h1>VELORA MASTER NODE</h1>
            <p style="color:#c084fc; margin:0;">Complete Server Orchestration System</p>
        </div>
        <div class="user-profile" id="userProfile" style="display:none;">
            <img id="userAvatar" src="" alt="Avatar">
            <span id="userName">Loading Node...</span>
        </div>
    </header>

    <div class="grid-layout">
        <div class="panel">
            <h2>🎵 Audio Stream Pipeline</h2>
            <div class="music-player">
                <div class="search-box">
                    <input type="text" id="songQuery" placeholder="Search track or inject asset URL...">
                    <button class="btn" onclick="triggerMusicAction('play_web')">Stream</button>
                </div>
                
                <div class="player-buttons">
                    <button class="btn btn-player" onclick="triggerMusicAction('pause')">⏸️</button>
                    <button class="btn btn-player" onclick="triggerMusicAction('resume')">▶️</button>
                    <button class="btn btn-player" onclick="triggerMusicAction('skip')">⏭️</button>
                    <button class="btn btn-player" onclick="triggerMusicAction('stop')">⏹️</button>
                </div>

                <div class="volume-container" style="text-align: center; display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size:0.85rem; color:#c084fc;">Volume Output Metric</label>
                    <input type="range" min="0" max="150" value="100" style="width: 100%; accent-color: var(--accent-purple);" onchange="adjustVolume(this.value)">
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>🛡️ System Filtering Parameters</h2>
            <div class="switch-container">
                <span>AutoMod: Blacklist Invite & Web Links</span>
                <label class="switch">
                    <input type="checkbox" id="auto_mod_links" onchange="toggleFeature('auto_mod_links')">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="switch-container">
                <span>Anti-Spam Packet Isolation</span>
                <label class="switch">
                    <input type="checkbox" id="anti_spam" onchange="toggleFeature('anti_spam')">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="panel">
            <h2>⚙️ Core Settings</h2>
            <div class="form-group">
                <label>Custom Prefix</label>
                <input type="text" id="botPrefix" value="!">
            </div>
            <div class="form-group">
                <label>Embed Footer Text</label>
                <input type="text" id="botFooter" value="Velora Bot">
            </div>
            <button class="btn" onclick="saveCoreSettings()">Save Core Matrix</button>
        </div>

        <div class="panel">
            <h2>🖼️ Welcome Logs Framework</h2>
            <div class="form-group">
                <label>Target Log Channel ID</label>
                <input type="text" id="welcomeChannel">
            </div>
            <div class="form-group">
                <label>Banner Title</label>
                <input type="text" id="bannerTitle" value="WELCOME DISCORD_USER">
            </div>
            <div class="form-group">
                <label>Background URL</label>
                <input type="text" id="bannerBg">
            </div>
            <button class="btn" onclick="saveWelcomeBanner()">Push Layout</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://87.232.72.111:15378"; 
    const CURRENT_GUILD = "1350118248934408233"; 

    // Auto OAuth2 User Data Loader (Restored)
    window.onload = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            try {
                const response = await fetch(`${API_BASE}/api/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ code: code })
                });
                const data = await response.json();
                if (data.user) {
                    document.getElementById('userProfile').style.display = 'flex';
                    document.getElementById('userAvatar').src = data.user.avatar;
                    document.getElementById('userName').innerText = data.user.username;
                }
            } catch (e) { console.error("OAuth Node Connection Error", e); }
        }
        loadGuildBranding();
    };

    async function loadGuildBranding() {
        try {
            const r = await fetch(`${API_BASE}/api/guild_branding/${CURRENT_GUILD}`);
            const data = await r.json();
            if(data) {
                document.getElementById('botPrefix').value = data.custom_prefix || '!';
                document.getElementById('botFooter').value = data.embed_footer_text || 'Velora Bot';
                document.getElementById('auto_mod_links').checked = data.auto_mod_links || false;
                document.getElementById('anti_spam').checked = data.anti_spam || false;
            }
        } catch(e) {}
    }

    // --- MUSIC CONTROLS ENGINE ---
    async function triggerMusicAction(action) {
        const queryVal = document.getElementById('songQuery').value;
        try {
            await fetch(`${API_BASE}/api/music_control`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ guild_id: CURRENT_GUILD, action: action, query: queryVal })
            });
        } catch (error) {}
    }

    async function adjustVolume(vol) {
        try {
            await fetch(`${API_BASE}/api/music_control`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ guild_id: CURRENT_GUILD, action: 'volume', volume: vol })
            });
        } catch (error) {}
    }

    async function toggleFeature(featureName) {
        try {
            await fetch(`${API_BASE}/api/toggle`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ guild_id: CURRENT_GUILD, feature: featureName })
            });
        } catch (error) {}
    }

    // --- CORE SAVE ENGINES (RESTORED) ---
    async function saveCoreSettings() {
        const p = document.getElementById('botPrefix').value;
        const f = document.getElementById('botFooter').value;
        await fetch(`${API_BASE}/api/save_core_settings`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ guild_id: CURRENT_GUILD, prefix: p, footer: f })
        });
        alert("Core Node Saved!");
    }

    async function saveWelcomeBanner() {
        const ch = document.getElementById('welcomeChannel').value;
        const t = document.getElementById('bannerTitle').value;
        const bg = document.getElementById('bannerBg').value;
        await fetch(`${API_BASE}/api/save_welcome_banner`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ guild_id: CURRENT_GUILD, channel_id: ch, title: t, bg_url: bg, subtitle: "Welcome!", text_color: "#FFFFFF" })
        });
        alert("Welcome Banner Configuration Synchronized!");
    }
</script>

</body>
</html>
