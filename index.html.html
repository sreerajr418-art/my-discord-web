<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA | Dashboard</title>
    <style>
        :root { --bg: #020306; --accent: #ff0055; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .navbar { padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .login-btn { background: #5865F2; color: #fff; padding: 12px 28px; border-radius: 10px; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-logo">VELORA</div>
        <div id="nav-auth-box">
            <button class="login-btn" onclick="redirectToDiscordOAuth()">Login with Discord</button>
        </div>
    </div>
    <script>
        const REDIRECT_URI = encodeURIComponent("https://my-discord-web-five.vercel.app/");
        const CLIENT_ID = "1499880240640692465";

        function redirectToDiscordOAuth() {
            window.location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=code&scope=identify%20guilds`;
        }

        async function checkOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                try {
                    const res = await fetch("http://87.232.72.111:15378/api/auth", {
                        method: "POST", 
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ code: code })
                    });
                    const data = await res.json();
                    if (data.user) {
                        console.log("Authentication Successful");
                    }
                } catch(e) { document.body.innerHTML = "Authentication Failed"; }
            }
        }
        window.addEventListener('load', checkOAuthCallback);
    </script>
</body>
</html>
